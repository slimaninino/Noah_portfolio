name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # GitHub Pages serves a *user* repo (<owner>.github.io) from the domain
      # root, but a *project* repo (anything else) from a /<repo-name>/
      # subpath. This detects which one we're in and exports the right
      # base path / site URL, so the same workflow works for either without
      # any manual config.
      - name: Compute base path and site URL
        id: site
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == "${OWNER}.github.io" ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${REPO}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        run: npm run build:pages
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.site.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.site.outputs.site_url }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
